services:
  # ── MARIADB (Database Service) ──────────────────────────────
  mariadb:
    image: mariadb:alpine3.22
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    container_name: mariadb
    env_file: .env
    secrets:
      - db_password
      - db_root_password
      - mariadb_exporter_pwd
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception
    restart: always

  # ── WORDPRESS + PHP-FPM (To be implemented) ──────────────────
  wordpress:
    image: wordpress:alpine3.22
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    container_name: wordpress
    env_file: .env
    secrets:
      - db_password
      - credentials
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    restart: always
    depends_on:
      - mariadb

  # ── NGINX (Reverse Proxy) (To be implemented) ───────────────
  nginx:
    image: nginx:alpine3.22
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    restart: always
    depends_on:
      - wordpress

  # ── REDIS (Cache Service Bonus) ──────────────────────────────
  redis:
    image: redis:alpine3.22
    profiles:
      - bonus
    build:
      context: ./requirements/bonus/redis
      dockerfile: Dockerfile
    container_name: redis
    networks:
      - inception
    restart: always
    depends_on:
      - wordpress

  # ── FTP SERVER (Bonus) ───────────────────────────────────────
  ftp:
    image: ftp:alpine3.22
    profiles:
      - bonus
    build:
      context: ./requirements/bonus/ftp
      dockerfile: Dockerfile
    container_name: ftp
    env_file: .env
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    restart: always
    depends_on:
      - wordpress

  # ── STATIC WEBSITE (Bonus) ───────────────────────────────────
  static:
    image: static:alpine3.22
    profiles:
      - bonus
    build:
      context: ./requirements/bonus/static
      dockerfile: Dockerfile
    container_name: static
    networks:
      - inception
    restart: always

  # ── ADMINER (Bonus) ──────────────────────────────────────────
  adminer:
    image: adminer:alpine3.22
    profiles:
      - bonus
    build:
      context: ./requirements/bonus/adminer
      dockerfile: Dockerfile
    container_name: adminer
    networks:
      - inception
    restart: always
    depends_on:
      - mariadb

# Mapped to RAM files in /run/secrets/ inside containers
secrets:
  db_password:
    file: ~/secrets/db_password.txt
  db_root_password:
    file: ~/secrets/db_root_password.txt
  credentials:
    file: ~/secrets/credentials.txt
  mariadb_exporter_pwd:
    file: ~/secrets/mariadb_exporter_pwd.txt

# Persistent storage on the host machine
volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/serjimen/data/mariadb
  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/serjimen/data/wordpress

# Private virtual network for internal communication
networks:
  inception:
    driver: bridge