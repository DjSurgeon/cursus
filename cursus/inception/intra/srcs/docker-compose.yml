services:
  # --- MariaDB Service ---
  # Database engine for WordPress, accessible only within the internal network.
  mariadb:
    image: mariadb:alpine3.22
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    container_name: mariadb
    env_file: .env
    secrets:
      - db_password
      - db_root_password
      - mariadb_exporter_pwd
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception
    restart: always

  # --- WordPress and PHP-FPM Service ---
  # Processes PHP requests and manages the website content. Depends on MariaDB.
  wordpress:
    image: wordpress:alpine3.22
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    container_name: wordpress
    env_file: .env
    secrets:
      - db_password
      - credentials
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    restart: always
    depends_on:
      - mariadb

  # --- NGINX Reverse Proxy ---
  # The only entry point to the infrastructure, strictly serving over HTTPS.
  nginx:
    image: nginx:alpine3.22
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    container_name: nginx
    env_file: .env
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    restart: always
    depends_on:
      - wordpress

  # --- Redis Cache Service (Bonus) ---
  # Provides object caching for WordPress to improve performance.
  redis:
    image: redis:alpine3.22
    profiles:
      - bonus
    build:
      context: ./requirements/bonus/redis
      dockerfile: Dockerfile
    container_name: redis
    networks:
      - inception
    restart: always
    depends_on:
      - wordpress

  # --- FTP Server (Bonus) ---
  # Allows secure file transfers directly to the WordPress volume.
  ftp:
    image: ftp:alpine3.22
    profiles:
      - bonus
    build:
      context: ./requirements/bonus/ftp
      dockerfile: Dockerfile
    container_name: ftp
    env_file: .env
    secrets:
      - credentials
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    restart: always
    depends_on:
      - wordpress

  # --- Static Website (Bonus) ---
  # Serves a lightweight static HTML page without PHP processing.
  static:
    image: static:alpine3.22
    profiles:
      - bonus
    build:
      context: ./requirements/bonus/static
      dockerfile: Dockerfile
    container_name: static
    networks:
      - inception
    restart: always

  # --- Adminer (Bonus) ---
  # Lightweight database management tool accessible via reverse proxy.
  adminer:
    image: adminer:alpine3.22
    profiles:
      - bonus
    build:
      context: ./requirements/bonus/adminer
      dockerfile: Dockerfile
    container_name: adminer
    networks:
      - inception
    restart: always
    depends_on:
      - mariadb

  # --- MariaDB Exporter (Bonus) ---
  # Extracts metrics from MariaDB for Prometheus scraping.
  mariadb-exporter:
    image: mariadb-exporter:alpine3.22
    profiles:
      - bonus
    build:
      context: ./requirements/bonus/mariadb-exporter
      dockerfile: Dockerfile
    container_name: mariadb-exporter
    secrets:
      - mariadb_exporter_pwd
    networks:
      - inception
    restart: always
    depends_on:
      - mariadb

  # --- Prometheus Monitoring (Bonus) ---
  # Monitors system and service metrics across the infrastructure.
  prometheus:
    image: prometheus:alpine3.22
    profiles:
      - bonus
    build:
      context: ./requirements/bonus/prometheus
      dockerfile: Dockerfile
    container_name: prometheus
    networks:
      - inception
    restart: always
    depends_on:
      - mariadb-exporter

  # --- Grafana Dashboard (Bonus) ---
  # Visualizes the metrics collected by Prometheus in a web interface.
  grafana:
    image: grafana:alpine3.22
    profiles:
      - bonus
    build:
      context: ./requirements/bonus/grafana
      dockerfile: Dockerfile
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - inception
    restart: always
    depends_on:
      - prometheus

# --- Docker Secrets ---
# Securely maps sensitive files from the host directly into container RAM (/run/secrets/).
secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt
  mariadb_exporter_pwd:
    file: ../secrets/mariadb_exporter_pwd.txt

# --- Named Volumes ---
# Defines persistent storage using local bind mounts as required by the subject.
volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/mariadb
  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/wordpress

# --- Custom Bridge Network ---
# Isolates all containers in a private virtual network for secure internal communication.
networks:
  inception:
    driver: bridge