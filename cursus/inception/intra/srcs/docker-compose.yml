services:
  # ── MARIADB (Database Service) ──────────────────────────────
  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile.alpine
    container_name: mariadb
    env_file: .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception
    restart: always

