events {
    # Define the maximum number of simultaneous connections per worker process.
    worker_connections 1024;
}

http {
    # Include standard MIME types to ensure CSS, JS, and other files load correctly.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        # Port and SSL configuration (Port 443).
        listen 443 ssl;
        listen [::]:443 ssl;

        # Define the domain name for the server.
        server_name DOMAIN_NAME_PLACEHOLDER;

        # Specify the paths to the TLS certificates generated in the Dockerfile.
        ssl_certificate /etc/nginx/ssl/inception.crt;
        ssl_certificate_key /etc/nginx/ssl/inception.key;

        # Restrict allowed protocols to TLSv1.2 and TLSv1.3.
        ssl_protocols TLSv1.2 TLSv1.3;

        # Define the root directory where WordPress files are located.
        root /var/www/html;
        index index.php index.html index.htm;

        # Default routing behavior: attempt to serve the file, directory, or route to PHP.
        location / {
            try_files $uri $uri/ /index.php$is_args$args;
        }

        # --- Bonus: Adminer Reverse Proxy ---
        location = /adminer {
            return 301 /adminer/;
        }

        location ^~ /adminer/ {
            resolver 127.0.0.11 valid=30s;
            set $adminer "adminer:8080";
            rewrite ^/adminer/(.*) /$1 break;
            proxy_pass http://$adminer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Bonus: Static Site Reverse Proxy ---
        location = /cheatsheet {
            return 301 /cheatsheet/;
        }

        location ^~ /cheatsheet/ {
            resolver 127.0.0.11 valid=30s;
            set $static "static:1337";
            rewrite ^/cheatsheet/(.*) /$1 break;
            proxy_pass http://$static;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- PHP-FPM FastCGI Bridge ---
        location ~ \.php$ {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            
            # Forward requests to the WordPress container on its internal port.
            fastcgi_pass wordpress:9000;
            fastcgi_index index.php;
            
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }
}