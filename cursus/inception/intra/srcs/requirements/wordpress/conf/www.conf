; PHP-FPM pool configuration file.

[www]
; Define the default user and group for web services in Alpine Linux.
user = nobody
group = nobody

; Listen on port 9000 from any IP on the internal network.
listen = 0.0.0.0:9000

; Process management configuration (dynamic pool).
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Allow PHP workers to read environment variables from the container (.env file).
; This is crucial for accessing database credentials.
clear_env = no