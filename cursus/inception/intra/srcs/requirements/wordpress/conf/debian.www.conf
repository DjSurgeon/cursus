[www]
; User and group that php-fpm runs as
; www-data is the standard web server user in Debian
user  = www-data
group = www-data

; Listen on all interfaces on port 9000
; This is how NGINX connects to php-fpm from another container
; 0.0.0.0 means "accept connections from any IP"
listen = 0.0.0.0:9000

; Who can connect to the socket
listen.owner = www-data
listen.group = www-data

; Process management mode
; dynamic = starts a base number of workers and scales up/down as needed
pm = dynamic

; Maximum number of PHP worker processes
pm.max_children = 5

; Number of processes to start when php-fpm starts
pm.start_servers = 2

; Minimum number of idle processes
pm.min_spare_servers = 1

; Maximum number of idle processes
pm.max_spare_servers = 3