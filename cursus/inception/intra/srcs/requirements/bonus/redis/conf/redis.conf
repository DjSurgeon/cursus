# --- REDIS CONFIGURATION FOR INCEPTION ---

# 1. Network Binding
# By default, Redis listens only on localhost (127.0.0.1). 
# We bind it to 0.0.0.0 to allow connections from other containers (like WordPress) 
# within the isolated Docker 'inception' network.
bind 0.0.0.0

# 2. Protected Mode
# Disable protected mode because we are operating within a closed, 
# secure Docker bridge network where external access is impossible.
protected-mode no

# 3. Memory Management
# Limit maximum memory usage to prevent the container from consuming all host RAM.
maxmemory 256mb
# Eviction policy: Remove the least recently used (LRU) keys first when memory is full.
maxmemory-policy allkeys-lru
